name: Godot CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Godot
        run: |
          wget https://downloads.tuxfamily.org/godotengine/4.2/Godot_v4.2-stable_linux.x86_64.zip
          unzip Godot_v4.2-stable_linux.x86_64.zip
          mv Godot_v4.2-stable_linux.x86_64 godot
          chmod +x godot

      - name: Verificar proyecto
        run: |
          ./godot --headless --quit

      - name: Exportar juego
        run: |
          mkdir -p build
          ./godot --headless --export-release "Windows Desktop" build/game.exe

      - name: Subir build
        uses: actions/upload-artifact@v4
        with:
          name: juego-ajolote
          path: build/